name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov pytest-asyncio

      - name: Create dummy secrets.toml for CI
        run: |
          cat <<'EOF' > secrets.toml
          [database.snowflake]
          type = "snowflake"
          account = "ci-test"
          user = "ci@test.com"
          private_key_path = ".rsa/rsa_key.p8"
          role = "CI_ROLE"
          warehouse = "CI_WH"
          database = "CI_DB"
          schema = "CI_SCHEMA"

          [llm.local-llm]
          provider = "local-llm"
          model = "test-model"
          base_url = "http://localhost:1234/v1"
          api_key = "test-key"
          EOF

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=src --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: daoudfares/rag
